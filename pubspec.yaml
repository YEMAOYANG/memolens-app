name: memolens
description: AI 驱动的相机记忆工具 - 拍一下，记住一切
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理 & 路由 - GetX
  get: ^4.6.6

  # 加载提示
  flutter_easyloading: ^3.0.5

  # 相机 & 图片
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  photo_view: ^0.14.0

  # OCR（本地）
  google_mlkit_text_recognition: ^0.13.0

  # 网络
  dio: ^5.4.3+1

  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # 工具
  intl: ^0.19.0
  uuid: ^4.3.3
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  url_launcher: ^6.2.5
  sentry_flutter: ^7.18.0

  # UI 增强
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
